[project]
name = "gaptrace-capture"
version = "0.1.0"
description = "Pipeline instrumentation SDK for gaptrace observability system"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    { name = "Leo Karthik Paramasivan", email = "pleokarthik@gmail.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "gaptrace-core>=0.1.0,<0.2.0",
]

[project.urls]
Homepage = "https://github.com/pleokarthik/Gaptrace"
Repository = "https://github.com/pleokarthik/Gaptrace"
Issues = "https://github.com/pleokarthik/Gaptrace/issues"

[project.scripts]
gaptrace-capture = "gaptrace_capture.scaffold.cli:main"

[tool.uv.sources]
gaptrace-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gaptrace_capture"]
