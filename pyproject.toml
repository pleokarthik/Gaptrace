[tool.uv.workspace]
members = [
    "packages/gaptrace-core",
    "packages/gaptrace-capture",
    "packages/gaptrace",
    "packages/gaptrace-evaluate",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.15",
]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
# E501 (line-too-long) excluded: ruff format already reflows what it safely
# can, and the remaining long lines are SQL/dict literals that don't wrap
# cleanly — see ruff's own docs recommending this pairing.
select = ["E4", "E7", "E9", "F", "I", "W"]
